services:
  - type: web
    name: diam-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: diam-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: diam-db
    plan: free
